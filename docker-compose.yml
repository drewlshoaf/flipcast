services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flipcast}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flipcast}
      POSTGRES_DB: ${POSTGRES_DB:-flipcast}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flipcast}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      FLIPCAST_BUCKET: ${FLIPCAST_BUCKET:-flipcast-audio}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/$$FLIPCAST_BUCKET &&
      mc anonymous set download local/$$FLIPCAST_BUCKET
      "

  migrate:
    build:
      context: .
      dockerfile: packages/server-db/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-flipcast}:${POSTGRES_PASSWORD:-flipcast}@postgres:5432/${POSTGRES_DB:-flipcast}
    command: ["pnpm", "db:push"]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER:-flipcast}:${POSTGRES_PASSWORD:-flipcast}@postgres:5432/${POSTGRES_DB:-flipcast}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_BUCKET: ${FLIPCAST_BUCKET:-flipcast-audio}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      FLIPCAST_DEFAULT_SPEED: ${FLIPCAST_DEFAULT_SPEED:-1.0}
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/public:/app/apps/web/public
      - ./apps/web/next.config.mjs:/app/apps/web/next.config.mjs
      - ./packages/types/src:/app/packages/types/src
      - ./packages/server-db/src:/app/packages/server-db/src
      - ./packages/queue/src:/app/packages/queue/src

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER:-flipcast}:${POSTGRES_PASSWORD:-flipcast}@postgres:5432/${POSTGRES_DB:-flipcast}
      REDIS_URL: redis://redis:6379
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_BUCKET: ${FLIPCAST_BUCKET:-flipcast-audio}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      FLIPCAST_DEFAULT_SPEED: ${FLIPCAST_DEFAULT_SPEED:-1.0}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
    command: ["pnpm", "dev"]
    volumes:
      - ./apps/worker/src:/app/apps/worker/src
      - ./apps/worker/scripts:/app/apps/worker/scripts
      - ./apps/web/public:/app/apps/web/public
      - ./packages/types/src:/app/packages/types/src
      - ./packages/server-db/src:/app/packages/server-db/src
      - ./packages/queue/src:/app/packages/queue/src

volumes:
  postgres_data:
  redis_data:
  minio_data:
